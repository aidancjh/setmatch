name: CI

# Runs the same gates used before every deploy — type-check, tests, and the
# production build — on every push to main and every PR targeting it. Railway
# deploys independently on push; enable branch protection (require this check
# on PRs) to actually block a broken commit from reaching production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run if a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
