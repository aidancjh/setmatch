<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No maximum-scale: blocking pinch-zoom fails WCAG 1.4.4 (Resize Text).
         viewport-fit=cover keeps the app edge-to-edge under the notch/home bar. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Coterie — Find your players. Fill your games.</title>
    <meta
      name="description"
      content="Coterie helps you find players and fill your volleyball games. Post a game, set your slots, and fill the open spots."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Public Sans — the app typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- iOS: allow "Add to Home Screen" to open full-screen like an app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Coterie" />
    <!-- Instant splash so the first paint is never a blank white screen while
         the JS bundle downloads. React replaces #root's contents on mount. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #ffffff;
        font-family: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app-splash .stage { position: relative; width: 84px; height: 140px; }
      #app-splash .ball {
        position: absolute;
        left: 10px;
        bottom: 10px;
        width: 64px;
        height: 64px;
        transform-origin: center bottom;
        animation: splash-bounce 1.05s infinite;
      }
      #app-splash .ball svg {
        display: block;
        width: 100%;
        height: 100%;
        transform-origin: center;
        animation: splash-spin 2.4s linear infinite;
      }
      #app-splash .shadow {
        position: absolute;
        left: 14px;
        bottom: 4px;
        width: 56px;
        height: 11px;
        background: #0f172a;
        border-radius: 50%;
        transform-origin: center;
        animation: splash-shadow 1.05s infinite;
      }
      #app-splash .wordmark {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #d92632;
      }
      @keyframes splash-bounce {
        0%   { transform: translateY(-72px); animation-timing-function: cubic-bezier(0.6, 0.02, 0.9, 0.4); }
        50%  { transform: translateY(0);     animation-timing-function: cubic-bezier(0.2, 0.6, 0.35, 1); }
        100% { transform: translateY(-72px); }
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @keyframes splash-shadow {
        0%   { transform: scaleX(0.5); opacity: 0.16; animation-timing-function: cubic-bezier(0.6, 0.02, 0.9, 0.4); }
        50%  { transform: scaleX(1);   opacity: 0.42; animation-timing-function: cubic-bezier(0.2, 0.6, 0.35, 1); }
        100% { transform: scaleX(0.5); opacity: 0.16; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .ball, #app-splash .ball svg, #app-splash .shadow { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="stage">
          <div class="shadow"></div>
          <div class="ball">
            <svg viewBox="0 0 120 120" role="img" aria-label="Volleyball" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <clipPath id="vbSplashClip"><circle cx="60" cy="60" r="54" /></clipPath>
                <!-- one seam arm; reused at 120°/240° so the pinwheel is perfectly symmetric -->
                <g id="vbSplashArm" fill="none" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round">
                  <path d="M60 60 C 48 76, 46 96, 56 118" />
                  <path d="M78 66 C 68 82, 68 102, 76 118" />
                </g>
              </defs>
              <circle cx="60" cy="60" r="54" fill="#d92632" />
              <g clip-path="url(#vbSplashClip)" opacity="0.96">
                <use href="#vbSplashArm" />
                <use href="#vbSplashArm" transform="rotate(120 60 60)" />
                <use href="#vbSplashArm" transform="rotate(240 60 60)" />
              </g>
            </svg>
          </div>
        </div>
        <div class="wordmark">Coterie</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
