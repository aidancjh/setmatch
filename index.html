<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Coterie — Find your players. Fill your games.</title>
    <meta
      name="description"
      content="Coterie helps you find players and fill your volleyball games. Post a game, set your slots, and fill the open spots."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#f4634e" />
    <!-- Inter — the standard modern app typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- iOS: allow "Add to Home Screen" to open full-screen like an app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Coterie" />
    <!-- Instant splash so the first paint is never a blank white screen while
         the JS bundle downloads. React replaces #root's contents on mount. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #fff;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app-splash .ball {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid #fde2dc;
        border-top-color: #f4634e;
        animation: app-splash-spin 0.8s linear infinite;
      }
      #app-splash .wordmark {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #f4634e;
      }
      @keyframes app-splash-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .ball { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="ball"></div>
        <div class="wordmark">Coterie</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
