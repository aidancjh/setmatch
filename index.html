<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Vybe — Find your players. Fill your games.</title>
    <meta
      name="description"
      content="Vybe helps you find players and fill your volleyball games. Post a game, set your slots, and fill the open spots."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#000000" />
    <!-- Public Sans — the app typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- iOS: allow "Add to Home Screen" to open full-screen like an app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vybe" />
    <!-- Instant splash so the first paint is never a blank white screen while
         the JS bundle downloads. React replaces #root's contents on mount. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #000000;
        font-family: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app-splash .stage { position: relative; width: 84px; height: 140px; }
      #app-splash .ball {
        position: absolute;
        left: 10px;
        bottom: 10px;
        width: 64px;
        height: 64px;
        transform-origin: center bottom;
        animation: splash-bounce 1.05s infinite;
      }
      #app-splash .ball svg {
        display: block;
        width: 100%;
        height: 100%;
        transform-origin: center;
        animation: splash-spin 2.4s linear infinite;
      }
      #app-splash .shadow {
        position: absolute;
        left: 14px;
        bottom: 4px;
        width: 56px;
        height: 11px;
        background: #000;
        border-radius: 50%;
        transform-origin: center;
        animation: splash-shadow 1.05s infinite;
      }
      #app-splash .wordmark {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #2e86d9;
      }
      @keyframes splash-bounce {
        0%   { transform: translateY(-72px) scaleX(1)    scaleY(1);    animation-timing-function: cubic-bezier(0.6, 0.02, 0.9, 0.4); }
        50%  { transform: translateY(0)     scaleX(1)    scaleY(1);    animation-timing-function: cubic-bezier(0.2, 0, 0.35, 1); }
        57%  { transform: translateY(0)     scaleX(1.18) scaleY(0.82); animation-timing-function: cubic-bezier(0.1, 0.5, 0.4, 1); }
        64%  { transform: translateY(0)     scaleX(1)    scaleY(1);    animation-timing-function: cubic-bezier(0.33, 0, 0.2, 1); }
        100% { transform: translateY(-72px) scaleX(1)    scaleY(1); }
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @keyframes splash-shadow {
        0%   { transform: scaleX(0.5);  opacity: 0.16; animation-timing-function: cubic-bezier(0.6, 0.02, 0.9, 0.4); }
        50%  { transform: scaleX(1);    opacity: 0.42; }
        64%  { transform: scaleX(1.05); opacity: 0.42; }
        100% { transform: scaleX(0.5);  opacity: 0.16; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .ball, #app-splash .ball svg, #app-splash .shadow { animation: none; }
      }
    </style>
  </head>
  <body class="app-dark">
    <div id="root">
      <div id="app-splash">
        <div class="stage">
          <div class="shadow"></div>
          <div class="ball">
            <svg viewBox="0 0 120 120" role="img" aria-label="Volleyball" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="vbSplashFill" cx="38%" cy="32%" r="72%">
                  <stop offset="0%" stop-color="#6faee8" />
                  <stop offset="55%" stop-color="#0b6ecd" />
                  <stop offset="100%" stop-color="#0959a8" />
                </radialGradient>
                <clipPath id="vbSplashClip"><circle cx="60" cy="60" r="54" /></clipPath>
              </defs>
              <circle cx="60" cy="60" r="54" fill="url(#vbSplashFill)" />
              <g clip-path="url(#vbSplashClip)" fill="none" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round" opacity="0.96">
                <path d="M70 58 C 52 64, 40 82, 36 112" />
                <path d="M82 56 C 66 66, 56 86, 54 114" />
                <path d="M70 58 C 50 50, 28 50, 4 60" />
                <path d="M71 47 C 52 38, 26 36, 2 44" />
                <path d="M70 58 C 74 40, 70 22, 58 4" />
                <path d="M82 56 C 90 40, 90 22, 82 6" />
              </g>
              <ellipse cx="42" cy="38" rx="16" ry="11" fill="#ffffff" opacity="0.18" />
            </svg>
          </div>
        </div>
        <div class="wordmark">Vybe</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
