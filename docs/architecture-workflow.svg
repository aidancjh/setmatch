<text x="269" y="544" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Cloudinary</text>
<text x="269" y="560" text-anchor="middle" font-size="12" fill="#5F5E5A">photos, videos</text>
<rect x="354" y="524" width="125" height="48" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="416" y="544" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Sentry</text>
<text x="416" y="560" text-anchor="middle" font-size="12" fill="#5F5E5A">crash alerts</text>
<rect x="501" y="524" width="125" height="48" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="563" y="544" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">PostHog</text>
<text x="563" y="560" text-anchor="middle" font-size="12" fill="#5F5E5A">analytics</text>

<rect x="40" y="606" width="600" height="100" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="56" y="629" font-size="14" font-weight="500" fill="#2C2C2A">How your code gets live</text>
<rect x="55" y="642" width="170" height="48" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="140" y="662" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Your PC or laptop</text>
<text x="140" y="678" text-anchor="middle" font-size="12" fill="#5F5E5A">you and Claude edit</text>
<line x1="225" y1="666" x2="251" y2="666" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="255" y="642" width="170" height="48" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="662" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">GitHub</text>
<text x="340" y="678" text-anchor="middle" font-size="12" fill="#5F5E5A">git push</text>
<line x1="425" y1="666" x2="451" y2="666" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="455" y="642" width="170" height="48" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="540" y="662" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Railway rebuilds</text>
<text x="540" y="678" text-anchor="middle" font-size="12" fill="#5F5E5A">live in about 2 min</text>
</svg>
